name: Week 08 - Python
on:
  workflow_dispatch:
  push:
    paths:
      - 'week08/**'
      - '.github/workflows/week08.yml'
  pull_request:
    paths:
      - 'week08/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if lab files exist
        id: check_file
        run: |
          if [ -f "week08/weather.py" ] && [ -f "week08/weather_api.py" ] && [ -f "week08/favorites.py" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Week 08 tests
        if: steps.check_file.outputs.exists == 'true'
        run: |
          export PYTHONPATH="${PYTHONPATH}:week08"
          pytest week08/tests/ -v

      - name: Lab files not found
        if: steps.check_file.outputs.exists == 'false'
        run: |
          echo "❌ Required lab files not found"
          echo "Create weather.py, weather_api.py, and favorites.py to start the lab"
          exit 1
